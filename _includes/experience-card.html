<div class="experience-card">

  <div class="experience-header">
    <div class="experience-title">
      <img src="{{ item.logo }}" class="exp-logo" alt="logo">
      <h2>{{ item.title }}</h2>
    </div>

    <div class="experience-link">
      <a href="{{ item.link }}" target="_blank">🔗 Project Page</a>
    </div>
  </div>

  <div class="experience-meta">
    📍 {{ item.location }} <br>
    🗓 {{ item.start }} – {{ item.end }}
  </div>

  <div class="experience-summary">
    {{ item.summary }}
  </div>

  <div class="experience-tech">
    <em>{{ item.tech }}</em>
  </div>

</div>
